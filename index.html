<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【トップ】高専品川 学生食堂ナビ</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f4f9; font-family: 'Hiragino Kaku Gothic ProN', sans-serif; color: #333; }
        .header { background-color: #ff9800; color: #fff; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; }
        .container { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        /* メニュー項目のボタンデザイン */
        .menu-btn { 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            background: #fff; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            text-decoration: none; 
            color: #333; 
            font-size: 18px; 
            font-weight: bold; 
            border-left: 6px solid #ff9800;
            transition: transform 0.2s;
        }
        .menu-btn:active { transform: scale(0.98); } /* タップした時に少し沈む演出 */
        .arrow { color: #ff9800; font-size: 20px; }
    </style>
</head>
<body>

    <div class="header">高専品川 学生食堂ナビ</div>
    
    <div class="container">
        <a href="vending.html" class="menu-btn">
            <span>🎫 券売機の混雑状況</span>
            <span class="arrow">▶</span>
        </a>

        <a href="kitchen.html" class="menu-btn">
            <span>🕒 メニュー別 提供・売り切れ状況</span>
            <span class="arrow">▶</span>
        </a>

        <a href="map.html" class="menu-btn">
            <span>🪑 学食の空席マップ</span>
            <span class="arrow">▶</span>
        </a>
    </div>

</body>
</html>
